<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Tracking Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard-container">
    <header>
      <h1>Tracking Dashboard Prototype</h1>
      <div id="system-status" class="status-indicator">Checking system health...</div>
    </header>

    <main>
      <section class="controls">
        <h2>Add Tracking Event</h2>
        <form id="tracking-form">
          <div class="form-group">
            <label for="event-name">Event Name:</label>
            <input type="text" id="event-name" name="eventName" required placeholder="e.g., page_view">
          </div>
          <div class="form-group">
            <label for="event-value">Value (Numeric):</label>
            <input type="number" id="event-value" name="value" placeholder="Optional value">
          </div>
          <button type="submit" id="submit-btn">Record Event</button>
        </form>
        <div id="form-error" class="error-message hidden"></div>
      </section>

      <section class="data-view">
        <h2>Recent Events <span id="loading-indicator" class="hidden">Loading...</span></h2>
        <div id="global-error" class="error-message hidden"></div>
        <table id="events-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Event</th>
              <th>Value</th>
              <th>Timestamp</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="events-body">
            <!-- Data will be injected here via app.js -->
          </tbody>
        </table>
        <div id="empty-state" class="empty-state">No tracking events recorded yet.</div>
      </section>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
